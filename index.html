<meta charset="utf-8">
<!-- Dad's Stocks - bilingual SGX watchlist, large-type, tap-first.
     Built for an elderly reader who reads but doesn't type.
     Convention: red = up, green = down. Flip with MOVE_RED_IS_UP below. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  :root{
    --ivory:#FBF8F1;
    --paper:#FFFFFF;
    --ink:#1C1815;
    --ink-soft:#6E665C;
    --line:#EBE4D6;
    --gold:#A8842C;
    --jade:#2E6F5E;
    --gain:#C7402F;   /* red — up, Asian convention */
    --loss:#2E8B6F;   /* green — down */
    --press:#F1EADB;
    --font-base:-apple-system,system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --font-num:ui-rounded,"SF Pro Display",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--ivory);color:var(--ink);font-family:var(--font-base)}
  body{max-width:560px;margin:0 auto;padding:0 0 96px;line-height:1.35}
  .num{font-family:var(--font-num);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--ivory) 78%,rgba(251,248,241,0));
         padding:18px 20px 12px;border-top:3px solid var(--gold)}
  .titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .title{font-size:25px;font-weight:700;letter-spacing:-0.01em}
  .subtitle{font-size:14px;color:var(--ink-soft);margin-top:2px}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper)}
  .lang button{appearance:none;border:0;background:transparent;font-family:var(--font-base);
                font-size:16px;font-weight:600;color:var(--ink-soft);padding:9px 15px;min-height:44px}
  .lang button.on{background:var(--ink);color:var(--ivory)}
  .statusrow{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
  .updated{font-size:13px;color:var(--ink-soft)}
  .refresh{appearance:none;border:1px solid var(--line);background:var(--paper);color:var(--ink);
           font-family:var(--font-base);font-size:15px;font-weight:600;padding:10px 16px;border-radius:12px;
           min-height:46px;display:inline-flex;align-items:center;gap:8px}
  .refresh:active{background:var(--press)}
  .refresh.spin .ic{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Cards */
  main{padding:4px 16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;margin:12px 0;
        box-shadow:0 1px 0 rgba(28,24,21,.02);overflow:hidden}
  .cardhead{display:flex;align-items:center;justify-content:space-between;gap:14px;
            padding:18px 18px;min-height:84px;cursor:pointer}
  .cardhead:active{background:var(--press)}
  .names{min-width:0}
  .name-main{font-size:22px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .name-sub{font-size:14px;color:var(--ink-soft);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pricewrap{text-align:right;flex:none}
  .price{font-size:28px;font-weight:700}
  .ccy{font-size:14px;color:var(--ink-soft);font-weight:600;margin-left:3px}
  .chip{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:15px;font-weight:700;
        padding:4px 10px;border-radius:999px;font-family:var(--font-num)}
  .chip.up{color:var(--gain);background:rgba(199,64,47,.10)}
  .chip.down{color:var(--loss);background:rgba(46,139,111,.12)}
  .chip.flat{color:var(--ink-soft);background:var(--press)}
  .arrow{font-size:13px}

  /* Detail */
  .detail{border-top:1px solid var(--line);padding:0 18px;max-height:0;overflow:hidden;
          transition:max-height .28s ease,padding .28s ease}
  .detail.open{max-height:3000px;padding:16px 18px 18px}
  .dlabel{font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin:6px 0 6px}
  .about{font-size:16px;color:var(--ink);line-height:1.55}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .stat{background:var(--ivory);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
  .stat .k{font-size:13px;color:var(--ink-soft)}
  .stat .v{font-size:18px;font-weight:700;margin-top:3px;font-family:var(--font-num)}
  .remove{margin-top:16px;width:100%;min-height:50px;border:1px solid var(--line);background:var(--paper);
          color:var(--gain);font-family:var(--font-base);font-size:16px;font-weight:600;border-radius:12px}
  .remove:active{background:var(--press)}
  .muted{color:var(--ink-soft)}

  /* Briefing */
  .sec{margin-top:15px}
  .sec p{margin:5px 0 0;font-size:16px;line-height:1.55}
  .news{list-style:none;margin:5px 0 0;padding:0}
  .news li{padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;line-height:1.45}
  .news li:last-child{border-bottom:0}
  .news .date{color:var(--gold);font-weight:700;font-size:13px;font-family:var(--font-num);margin-right:8px}
  .news .src{color:var(--ink-soft);font-size:13px}
  .newslink{color:var(--ink);text-decoration:none;display:block}
  .newslink .ext{color:var(--jade);font-weight:700}
  .newslink:active{opacity:.6}
  .newshead{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .newsrefresh{appearance:none;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
               font-family:var(--font-base);font-size:13px;font-weight:600;padding:7px 11px;border-radius:10px;
               min-height:38px;display:inline-flex;align-items:center;gap:6px}
  .newsrefresh:active{background:var(--press)}
  .newsrefresh.spin .ic{display:inline-block;animation:spin .8s linear infinite}
  .newsloading{padding:12px 2px;color:var(--ink-soft);font-size:15px}
  .prcons{margin-top:5px;display:flex;flex-direction:column;gap:6px}
  .prcons div{font-size:15px;line-height:1.45}
  .noteinput{width:100%;min-height:78px;border:1px solid var(--line);border-radius:12px;background:var(--ivory);
             font-family:var(--font-base);font-size:16px;line-height:1.5;padding:12px 13px;color:var(--ink);resize:vertical;margin-top:6px}
  .makebtn{width:100%;min-height:52px;margin-top:14px;border:0;border-radius:13px;background:var(--jade);color:#fff;
           font-family:var(--font-base);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
  .makebtn:active{filter:brightness(.93)}
  .sharebox{margin-top:12px;border:1px solid var(--line);border-radius:13px;background:var(--paper);padding:12px}
  .sharetext{width:100%;min-height:260px;border:0;background:transparent;font-family:var(--font-base);
             font-size:15px;line-height:1.62;color:var(--ink);resize:vertical}
  .copybtn{width:100%;min-height:50px;border:0;border-radius:12px;background:var(--ink);color:var(--ivory);
           font-family:var(--font-base);font-size:16px;font-weight:700;margin-top:8px}
  .copybtn:active{filter:brightness(1.12)}
  .notadvice{font-size:12px;color:var(--ink-soft);margin-top:10px;text-align:center}

  /* Empty */
  .empty{text-align:center;color:var(--ink-soft);font-size:17px;padding:60px 30px;line-height:1.6}

  /* Add button + sheet */
  .addbar{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
          padding:14px 16px calc(14px + env(safe-area-inset-bottom));
          background:linear-gradient(rgba(251,248,241,0),var(--ivory) 32%)}
  .addbtn{width:100%;min-height:58px;border:0;border-radius:16px;background:var(--ink);color:var(--ivory);
          font-family:var(--font-base);font-size:18px;font-weight:700;display:flex;align-items:center;
          justify-content:center;gap:9px;box-shadow:0 6px 22px rgba(28,24,21,.18)}
  .addbtn:active{transform:translateY(1px)}

  .sheet-bg{position:fixed;inset:0;z-index:40;background:rgba(28,24,21,.42);opacity:0;pointer-events:none;
            transition:opacity .25s}
  .sheet-bg.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:560px;margin:0 auto;background:var(--ivory);
         border-radius:22px 22px 0 0;transform:translateY(102%);transition:transform .3s ease;
         max-height:86vh;display:flex;flex-direction:column}
  .sheet.open{transform:translateY(0)}
  .sheet-head{padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between}
  .sheet-title{font-size:20px;font-weight:700}
  .done{appearance:none;border:0;background:transparent;color:var(--jade);font-family:var(--font-base);
        font-size:17px;font-weight:700;padding:8px 6px;min-height:44px}
  .searchwrap{padding:0 18px 10px}
  .searchrow{display:flex;gap:8px;align-items:center}
  .search{flex:1;min-width:0;min-height:52px;border:1px solid var(--line);border-radius:14px;background:var(--paper);
          font-family:var(--font-base);font-size:17px;padding:0 16px;color:var(--ink)}
  .search::placeholder{color:var(--ink-soft)}
  .micbtn{flex:none;width:54px;height:52px;border:1px solid var(--line);border-radius:14px;background:var(--paper);
          font-size:23px;line-height:1;display:flex;align-items:center;justify-content:center}
  .micbtn:active{background:var(--press)}
  .micbtn.listening{background:var(--gain);color:#fff;border-color:var(--gain)}
  .searchtip{font-size:13px;color:var(--ink-soft);margin-top:9px;line-height:1.45}
  .photobtn{width:100%;min-height:56px;margin-bottom:12px;border:1px dashed var(--gold);border-radius:14px;
            background:var(--paper);color:var(--gold);font-family:var(--font-base);font-size:17px;font-weight:700;
            display:flex;align-items:center;justify-content:center;gap:8px}
  .photobtn:active{background:var(--press)}
  .addallbtn{width:100%;min-height:48px;margin:8px 0;border:0;border-radius:12px;background:var(--jade);
             color:#fff;font-family:var(--font-base);font-size:16px;font-weight:700}
  .addallbtn:active{filter:brightness(.93)}
  .finding{padding:16px 6px;color:var(--ink-soft);font-size:15px;text-align:center}
  .earn{margin-top:6px;display:flex;flex-direction:column}
  .erow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
  .erow:last-child{border-bottom:0}
  .erow.ehead{order:-1;color:var(--ink-soft);font-size:12px;font-weight:700;letter-spacing:.04em}
  .erow .ey{flex:0 0 70px;font-weight:700;font-family:var(--font-num)}
  .erow .ev{flex:1;text-align:right;font-family:var(--font-num)}
  .people{margin-top:6px;display:flex;flex-direction:column}
  .prow{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
  .prow:last-child{border-bottom:0}
  .prow .prole{color:var(--ink-soft);flex:0 0 auto}
  .prow .pname{font-weight:700;text-align:right}
  .pbline{display:flex;align-items:baseline;gap:10px;margin:6px 0 2px;padding:11px 13px;border-radius:12px;background:var(--ivory);border:1px solid var(--line)}
  .pbline.below{background:rgba(168,132,44,.10);border-color:var(--gold)}
  .pbline .pbnum{font-size:21px;font-weight:800;font-family:var(--font-num)}
  .pbline .pbword{font-size:14px;color:var(--ink-soft)}
  .pbline.below .pbword{color:var(--gold);font-weight:700}
  .vlist{margin-top:8px;display:flex;flex-direction:column}
  .vrow{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
  .vrow:last-child{border-bottom:0}
  .vrow .vk{color:var(--ink-soft)}
  .vrow .vv{font-weight:700;font-family:var(--font-num)}
  .calcnote{font-size:11px;color:var(--ink-soft);font-weight:600;font-family:var(--font-base)}
  .calcstar{color:var(--gold);font-weight:800}
  .ftnote{margin-top:6px;font-size:11px;color:var(--ink-soft);font-family:var(--font-base)}
  .ftwrap{margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  .ftable{border-collapse:collapse;width:100%;font-size:13px;font-family:var(--font-num)}
  .ftable th,.ftable td{padding:9px 11px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  .ftable th{color:var(--ink-soft);font-weight:700;font-size:12px;letter-spacing:.02em}
  .ftable th:first-child,.ftable td:first-child{text-align:left;position:sticky;left:0;background:var(--paper);font-weight:700}
  .ftable tbody tr:last-child td{border-bottom:0}
  .ftable td.navcol{color:var(--gold);font-weight:800;background:rgba(168,132,44,.07)}
  .ftable td.navedit{cursor:pointer}
  .navadd{display:inline-block;min-width:22px;text-align:center;color:var(--gold);opacity:.55;font-weight:800}
  .ftable td.navedit:active{background:rgba(168,132,44,.16)}
  .ftable th.navcol{color:var(--gold);background:rgba(168,132,44,.07)}
  .picklist{overflow-y:auto;padding:4px 12px 24px;-webkit-overflow-scrolling:touch}
  .pick{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper);
        border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:8px 0;min-height:66px}
  .pick .pn{font-size:18px;font-weight:700}
  .pick .ps{font-size:14px;color:var(--ink-soft);margin-top:2px}
  .pickadd{flex:none;min-width:62px;min-height:44px;border:1px solid var(--jade);background:var(--paper);
           color:var(--jade);font-family:var(--font-base);font-size:16px;font-weight:700;border-radius:11px;padding:0 14px}
  .pickadd:active{background:var(--press)}
  .pick.in .pickadd{border-color:var(--line);color:var(--ink-soft);background:var(--ivory)}

  .pricenote{text-align:center;font-size:12px;color:var(--ink-soft);padding:2px 0 8px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<header>
  <div class="titlerow">
    <div>
      <div class="title" id="t-title"></div>
      <div class="subtitle" id="t-subtitle"></div>
    </div>
    <div class="lang">
      <button id="lang-zh" onclick="setLang('zh')">中文</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="statusrow">
    <div class="updated" id="t-updated"></div>
    <button class="refresh" id="refreshBtn" onclick="refreshQuotes()">
      <span class="ic">↻</span><span id="t-refresh"></span>
    </button>
  </div>
</header>

<main id="list"></main>
<div class="pricenote" id="t-pricenote"></div>

<div class="addbar">
  <button class="addbtn" onclick="openSheet()"><span style="font-size:22px;line-height:1">＋</span><span id="t-add"></span></button>
</div>

<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-head">
    <div class="sheet-title" id="t-addtitle"></div>
    <button class="done" onclick="closeSheet()" id="t-done"></button>
  </div>
  <div class="searchwrap">
    <button class="photobtn" id="t-photobtn" onclick="document.getElementById('photoInput').click()"></button>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="onPhoto(event)">
    <div class="searchrow">
      <input class="search" id="search" oninput="onSearchInput()" autocomplete="off" enterkeyhint="search">
      <button class="micbtn" id="micbtn" onclick="micTap()" aria-label="speak">🎤</button>
    </div>
    <div class="searchtip" id="t-searchtip"></div>
  </div>
  <div class="picklist" id="picklist"></div>
</div>

/* ---------- state ---------- */
let lang = "zh";
let watchlist = [];          // [code,...]
let quotes = {};             // code -> {price,change,changePct,ccy,asOf}
let briefs = {};             // code -> { zh:{...}, en:{...} }  full briefing per language
let notes  = {};             // code -> your own note string (included when you make a note to send)
let lastUpdated = null;
let openCode = null;
let dataError = false;       // true when a live fetch fails (e.g. static preview)
let custom = {};             // code -> {en,zh} for stocks added via search (not in LIBRARY)
let manual = {};             // code -> { "FY2024": "S$0.42", ... }  NAV/share typed from the book
let findResults = [];        // remote search / photo candidates
let findBusy = false, findTimer = null, lastQuery = "";
let photoBusy = false, pickMsg = "";
let newsData = {};           // code -> {items:[...], at:timestamp}  (live, not cached to disk)
let newsBusy = {};           // code -> bool

/* ---------- storage (localStorage on your deployed site) ---------- */
async function sget(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
async function sset(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

/* ---------- helpers ---------- */
function meta(c){
  const lib=LIBRARY.find(x=>x.code===c); if(lib) return lib;
  if(custom[c]) return {code:c, en:custom[c].en||c, zh:custom[c].zh||custom[c].en||c};
  return {code:c, en:c, zh:c};
}
function nameMain(c){ const m=meta(c); return lang==="zh"?m.zh:m.en; }
function nameSub(c){ const m=meta(c); return (lang==="zh"?m.en:m.zh)+" · "+m.code; }
function fmt(n,d=2){ return (n==null||isNaN(n))?T[lang].dash:Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function hhmm(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function extractJSON(text, arr){
  if(!text) return null;
  const o=arr?text.indexOf("["):text.indexOf("{"); const c=arr?text.lastIndexOf("]"):text.lastIndexOf("}");
  if(o<0||c<0) return null;
  try{ return JSON.parse(text.slice(o,c+1)); }catch(e){ return null; }
}
function joinText(data){ return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n"); }

/* ---------- backend (your own Vercel functions) ---------- */
async function apiQuotes(codes){
  const names={}; codes.forEach(c=>{ names[c]=meta(c).en; });
  const res = await fetch("/api/quotes",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({codes,names})});
  if(!res.ok) throw new Error("quotes "+res.status);
  return res.json();   // -> [{code,price,change,changePct,ccy}]
}
async function apiBrief(code,name,L){
  const res = await fetch("/api/brief",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code,name,lang:L})});
  if(!res.ok) throw new Error("brief "+res.status);
  return res.json();   // -> {business,...} or {error:true, reason:"no_key"|...}
}
async function apiFind(q,L){
  const res = await fetch("/api/find",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({q,lang:L})});
  if(!res.ok) throw new Error("find "+res.status);
  return res.json();   // -> [{code,en,zh}]
}
async function apiPhoto(base64,mediaType,L){
  const res = await fetch("/api/photo",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({image:base64, mediaType, lang:L})});
  if(!res.ok) throw new Error("photo "+res.status);
  return res.json();   // -> [{code,en,zh}]
}
async function apiNews(code,name,L){
  const res = await fetch("/api/news",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code,name,lang:L})});
  if(!res.ok) throw new Error("news "+res.status);
  return res.json();   // -> [{date,headline,source,url}]
}
async function apiGetList(){
  try{ const r=await fetch("/api/watchlist"); if(!r.ok) return null; const d=await r.json(); return (d&&d.configured)?d:null; }
  catch(e){ return null; }
}
async function apiSaveList(){
  try{ await fetch("/api/watchlist",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({watchlist,custom,manual})}); }catch(e){}
}
async function editNav(code, year){
  const cur=(manual[code]&&manual[code][year])||"";
  const val=prompt(T[lang].enterNav.replace("{y}",year), cur);
  if(val===null) return;
  const v=val.trim();
  if(!manual[code]) manual[code]={};
  if(v) manual[code][year]=v; else delete manual[code][year];
  if(manual[code] && Object.keys(manual[code]).length===0) delete manual[code];
  await persistList();
  renderList();
}
async function persistList(){ await sset("watchlist",watchlist); await sset("custom",custom); await sset("manual",manual); apiSaveList(); }
async function syncList(){
  const remote=await apiGetList();
  if(remote && Array.isArray(remote.watchlist)){
    watchlist=remote.watchlist; custom=remote.custom||custom; manual=remote.manual||manual;
    await sset("watchlist",watchlist); await sset("custom",custom); await sset("manual",manual);
    renderList();
  }
}

/* ---------- render ---------- */
function applyStaticText(){
  const t=T[lang];
  document.getElementById("t-title").textContent=t.title;
  document.getElementById("t-subtitle").textContent=t.subtitle;
  document.getElementById("t-refresh").textContent=t.refresh;
  document.getElementById("t-add").textContent=t.add;
  document.getElementById("t-addtitle").textContent=t.addtitle;
  document.getElementById("t-done").textContent=t.done;
  document.getElementById("t-pricenote").textContent=t.pricenote;
  document.getElementById("search").placeholder=t.searchHint;
  document.getElementById("t-searchtip").textContent=t.searchTip;
  document.getElementById("t-photobtn").textContent="📷 "+t.photoAdd;
  document.getElementById("lang-zh").classList.toggle("on",lang==="zh");
  document.getElementById("lang-en").classList.toggle("on",lang==="en");
  document.documentElement.lang = lang==="zh"?"zh-Hans":"en";
  updateStatus();
}
function updateStatus(){
  const t=T[lang], el=document.getElementById("t-updated");
  if(document.getElementById("refreshBtn").classList.contains("spin")){ el.textContent=t.updating; return; }
  if(dataError){ el.textContent=t.dataErr; return; }
  if(!lastUpdated){ el.textContent=t.neverUpdated; return; }
  const d=new Date(lastUpdated);
  const hh=String(d.getHours()).padStart(2,"0"), mm=String(d.getMinutes()).padStart(2,"0");
  el.textContent = `${t.updated} ${hh}:${mm}`;
}
function chipFor(q){
  const t=T[lang];
  if(!q || q.changePct==null) return `<span class="chip flat num">${t.dash}</span>`;
  const pos = q.changePct>0, neg = q.changePct<0;
  let cls="flat",arrow="";
  if(pos){ cls = MOVE_RED_IS_UP?"up":"down"; arrow="▲"; }
  else if(neg){ cls = MOVE_RED_IS_UP?"down":"up"; arrow="▼"; }
  const chg = (q.change>0?"+":"")+fmt(q.change);
  const pct = (q.changePct>0?"+":"")+fmt(q.changePct)+"%";
  return `<span class="chip ${cls} num"><span class="arrow">${arrow}</span>${chg}　${pct}</span>`;
}
function stripCites(s){ return typeof s==="string" ? s.replace(/<\/?cite[^>]*>/gi,"").replace(/[ \t]+([,.;:])/g,"$1").replace(/[ \t]{2,}/g," ").trim() : s; }
function cleanBrief(o){
  if(!o || typeof o!=="object") return o;
  const out={};
  for(const k in o){
    const v=o[k];
    if(typeof v==="string") out[k]=stripCites(v);
    else if(Array.isArray(v)) out[k]=v.map(x=> typeof x==="string"?stripCites(x):(x&&typeof x==="object"?cleanBrief(x):x));
    else out[k]=v;
  }
  return out;
}
function esc(s){ return (s==null?"":String(s)).replace(/<\/?cite[^>]*>/gi,"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function sec(label, body){ return body?`<div class="sec"><div class="dlabel">${label}</div>${body}</div>`:""; }
function detailHTML(c){
  const t=T[lang];
  const b=(briefs[c]||{})[lang];
  const removeBtn=`<button class="remove" onclick="event.stopPropagation();removeStock('${c}')">✕ ${t.remove}</button>`;
  if(!b) return `<div class="about muted">${t.gettingInfo}</div>${removeBtn}`;
  if(b.error) return `<div class="sec"><p class="muted">${b.reason==="no_key"?t.noKey:t.fetchNote}</p></div>${removeBtn}`;
  const p=s=>`<p>${esc(s)}</p>`;
  // --- shared helpers for NAV maths (used by both the table and the asset-value box) ---
  const parseAmt=(s)=>{ if(s==null) return null; let str=String(s);
    let mult=1;
    if(/亿/.test(str)) mult=1e8; else if(/万/.test(str)) mult=1e4;
    else if(/b/i.test(str)) mult=1e9; else if(/m/i.test(str)) mult=1e6; else if(/k/i.test(str)) mult=1e3;
    const n=parseFloat(str.replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n*mult; };
  const curSym=()=> (lang==="zh"?"新币":"S$");
  const curPrice=(quotes[c]&&quotes[c].price)?quotes[c].price:null;
  // derive a reliable share count without relying on the AI's "shares" field
  let sharesCount=parseAmt(b.shares);
  if(!sharesCount && b.netassets && b.navps){ const e=parseAmt(b.netassets), n=parseAmt(b.navps); if(e&&n&&n>0) sharesCount=e/n; }
  if(!sharesCount && b.mktcap && curPrice){ const mc=parseAmt(b.mktcap); if(mc&&curPrice>0) sharesCount=mc/curPrice; }
  // current NAV/share (use reported; else calculate from net assets ÷ shares)
  let curNav=b.navps, curNavCalc=!!b.navpscalc;
  if(!curNav && b.netassets && sharesCount){ const e=parseAmt(b.netassets); if(e){ curNav=curSym()+(e/sharesCount).toFixed(2); curNavCalc=true; } }
  let h="";
  h+=sec(t.about,   b.business?p(b.business):"");
  h+=sec(t.results, b.results ?p(b.results) :"");
  if(Array.isArray(b.financials)&&b.financials.length){
    const F=b.financials;
    const navFor=(r)=>{
      const mo=(manual[c]&&manual[c][r.year]);
      if(mo) return {v:esc(mo),calc:false,man:true};
      if(r.navps) return {v:esc(r.navps),calc:false};
      const eq=parseAmt(r.netassets), sh=parseAmt(r.shares)||sharesCount;
      if(eq&&sh&&sh>0){ const per=eq/sh; if(per>0.001&&per<100000) return {v:curSym()+per.toFixed(2),calc:true}; }
      return {v:t.dash,calc:false};
    };
    const roeFor=(r)=>{
      if(r.roe) return {v:esc(r.roe),calc:false};
      const pr=parseAmt(r.profit), eq=parseAmt(r.netassets);
      if(pr&&eq&&eq>0){ const v=pr/eq*100; if(isFinite(v)&&v>-200&&v<200) return {v:v.toFixed(2)+"%",calc:true}; }
      return {v:t.dash,calc:false};
    };
    let anyCalc=false;
    const rows=F.map(r=>{
      const nv=navFor(r), re=roeFor(r);
      if(nv.calc||re.calc) anyCalc=true;
      const star=`<sup class="calcstar">*</sup>`;
      const navInner = (nv.v===t.dash ? `<span class="navadd">＋</span>` : nv.v) + (nv.calc?star:"") + (nv.man?`<sup class="calcstar">✎</sup>`:"");
      return `<tr><td>${esc(r.year)}</td><td>${esc(r.revenue)||t.dash}</td><td>${esc(r.profit)||t.dash}</td>`+
        `<td class="navcol navedit" onclick="editNav('${c}','${esc(r.year)}')">${navInner}</td><td>${esc(r.dividend)||t.dash}</td>`+
        `<td>${re.v}${re.calc?star:""}</td></tr>`;
    }).join("");
    h+=`<div class="sec"><div class="dlabel">${t.financials}</div>
      <div class="ftwrap"><table class="ftable">
        <thead><tr><th>${t.fyear}</th><th>${t.frev}</th><th>${t.fprofit}</th><th class="navcol">${t.fnav}</th><th>${t.fdiv}</th><th>${t.froe}</th></tr></thead>
        <tbody>`+rows+`</tbody></table></div>`+
      `<div class="ftnote">${anyCalc?("* "+t.calc+" · "):""}${t.tapnav}</div>`+`</div>`;
  }
  if(Array.isArray(b.people)&&b.people.length){
    h+=`<div class="sec"><div class="dlabel">${t.people}</div><div class="people">`+
       b.people.map(pp=>`<div class="prow"><span class="prole">${esc(pp.role)}</span><span class="pname">${esc(pp.name)}</span></div>`).join("")+
       `</div></div>`;
  }
  // Asset value — assets, shares, NAV vs price (his value lens)
  const pbNum = parseFloat(String(b.pb||"").replace(/[^0-9.\-]/g,""));
  let verdict="";
  if(!isNaN(pbNum) && pbNum>0){
    const word = pbNum<0.9 ? t.belowBook : (pbNum<=1.1 ? t.aroundBook : t.aboveBook);
    const cls  = pbNum<0.9 ? "below" : (pbNum<=1.1 ? "around" : "above");
    verdict = `<div class="pbline ${cls}"><span class="pbnum">${pbNum.toFixed(2)} ${t.pbtimes}</span><span class="pbword">${word}</span></div>`;
  }
  const rowval=(label,val)=>{
    if(label===t.navps && curNavCalc && val) return esc(val)+` <span class="calcnote">${t.calc}</span>`;
    return esc(val);
  };
  const sharesDisp = b.shares || (sharesCount? (sharesCount>=1e9? (sharesCount/1e9).toFixed(2)+(lang==="zh"?"十亿":"B") : (sharesCount/1e6).toFixed(0)+(lang==="zh"?"百万":"M")) : "");
  const vrows=[[t.mktcap,b.mktcap],[t.totalassets,b.totalassets],[t.totalliab,b.totalliab],[t.netassets,b.netassets],[t.shares,sharesDisp],[t.navps,curNav]].filter(r=>r[1]);
  if(verdict || vrows.length){
    h+=`<div class="sec"><div class="dlabel">${t.assetval}</div>${verdict}`+
       (vrows.length?`<div class="vlist">`+vrows.map(r=>`<div class="vrow"><span class="vk">${esc(r[0])}</span><span class="vv">${rowval(r[0],r[1])}</span></div>`).join("")+`</div>`:"")+
       `</div>`;
  }
  h+=sec(t.dividend, b.dividend?(p(b.dividend)+(b.divtrack?`<p class="muted">${esc(b.divtrack)}</p>`:"")):"");
  if(Array.isArray(b.divschedule)&&b.divschedule.length){
    h+=`<div class="sec"><div class="dlabel">${t.divschedule}</div>
      <div class="ftwrap"><table class="ftable">
        <thead><tr><th>${t.dtype}</th><th>${t.dex}</th><th>${t.dpay}</th><th class="navcol">${t.dper}</th></tr></thead>
        <tbody>`+
        b.divschedule.map(d=>`<tr><td>${esc(d.label)||t.dash}</td><td>${esc(d.exdate)||t.dash}</td><td>${esc(d.paydate)||t.dash}</td><td class="navcol">${esc(d.amount)||t.dash}</td></tr>`).join("")+
        `</tbody></table></div></div>`;
  }
  h+=sec(t.keydates, b.keydates?p(b.keydates):"");
  h+=sec(t.outlook,  b.outlook ?p(b.outlook) :"");
  h+=sec(t.analyst,  b.analyst ?p(b.analyst) :"");
  h+=sec(t.insider,  b.insider ?p(b.insider) :"");
  const stat=(k,v)=>`<div class="stat"><div class="k">${k}</div><div class="v">${esc(v)||t.dash}</div></div>`;
  let tiles=stat(t.pe,b.pe)+stat(t.yield,b.yield)+stat(t.range52,b.range52);
  if(b.netcash) tiles+=stat(t.netcash,b.netcash);
  h+=`<div class="stats">${tiles}</div>`;
  // latest news — always live, dated, tappable (separate from the cached briefing)
  const nd=newsData[c], items=(nd&&nd.items)||[];
  let newsInner;
  if(newsBusy[c] && !items.length) newsInner=`<div class="newsloading">${t.newsLoading}</div>`;
  else if(items.length){
    newsInner=`<ul class="news">`+ items.map(n=>{
      const inner=`<span class="date">${esc(n.date)}</span>${esc(n.headline)}`+(n.source?` <span class="src">· ${esc(n.source)}</span>`:"");
      return n.url ? `<li><a class="newslink" href="${esc(n.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${inner} <span class="ext">↗</span></a></li>`
                   : `<li>${inner}</li>`;
    }).join("") + `</ul>`;
  } else newsInner=`<div class="newsloading muted">${t.noNews}</div>`;
  const asOf = nd&&nd.at ? `${t.updated} ${hhmm(nd.at)}` : t.refresh;
  h+=`<div class="sec">
        <div class="newshead">
          <div class="dlabel">${t.news}</div>
          <button class="newsrefresh ${newsBusy[c]?'spin':''}" onclick="event.stopPropagation();loadNews('${c}',true)"><span class="ic">↻</span> ${asOf}</button>
        </div>${newsInner}
      </div>`;
  const list=(arr,icon)=> (Array.isArray(arr)&&arr.length)?`<div class="prcons">`+arr.map(x=>`<div>${icon} ${esc(x)}</div>`).join("")+`</div>`:"";
  h+=sec(t.pros, list(b.pros,"✅"));
  h+=sec(t.risks,list(b.risks,"⚠️"));
  h+=removeBtn;
  return h;
}
function renderList(){
  const t=T[lang], host=document.getElementById("list");
  if(watchlist.length===0){ host.innerHTML=`<div class="empty">${t.empty.replace("\n","<br>")}</div>`; return; }
  host.innerHTML = watchlist.map(c=>{
    const q=quotes[c]||{};
    const price = q.price!=null?`<span class="num">${fmt(q.price)}</span><span class="ccy">${q.ccy||"SGD"}</span>`
                              :`<span class="num muted">${t.dash}</span>`;
    const detail = openCode===c ? detailHTML(c) : "";
    return `
      <div class="card">
        <div class="cardhead" onclick="toggleCard('${c}')">
          <div class="names">
            <div class="name-main">${nameMain(c)}</div>
            <div class="name-sub">${nameSub(c)}</div>
          </div>
          <div class="pricewrap">
            <div class="price">${price}</div>
            ${chipFor(q)}
          </div>
        </div>
        <div class="detail ${openCode===c?'open':''}">${detail}</div>
      </div>`;
  }).join("");
}

/* ---------- interactions ---------- */
function setLang(l){ lang=l; sset("lang",l); applyStaticText(); renderList(); renderPicker();
  if(openCode && !(briefs[openCode]&&briefs[openCode][lang])) loadBrief(openCode,lang); }
async function toggleCard(c){
  if(openCode===c){ openCode=null; renderList(); return; }
  openCode=c; renderList();
  refreshOne(c);                                  // make the price current at open
  if(!(briefs[c]&&briefs[c][lang])) loadBrief(c,lang);
  loadNews(c);
}
async function refreshOne(c){
  try{
    const arr=await apiQuotes([c]);
    if(Array.isArray(arr)) arr.forEach(o=>{ if(o&&o.code&&o.price!=null){ quotes[o.code]={price:o.price,change:o.change,changePct:o.changePct,ccy:o.ccy||"SGD"}; }});
    lastUpdated=Date.now(); dataError=false; await sset("quotes",quotes); await sset("lastUpdated",lastUpdated);
    renderList(); updateStatus();
  }catch(e){}
}
async function removeStock(c){
  watchlist=watchlist.filter(x=>x!==c);
  if(openCode===c) openCode=null;
  await persistList();
  renderList(); renderPicker();
}
async function addStock(c, names){
  if(watchlist.includes(c)) return;
  if(names && !LIBRARY.find(x=>x.code===c)){
    custom[c]={en:names.en||c, zh:names.zh||names.en||c};
  }
  watchlist.push(c);
  await persistList();
  renderList(); renderPicker();
  if(!quotes[c]) refreshQuotes();
}
function addFromFind(i){ const x=findResults[i]; if(x) addStock(x.code,{en:x.en,zh:x.zh}); }
async function addAll(){
  let added=false;
  for(const x of (findResults||[])){
    if(!x||watchlist.includes(x.code)) continue;
    if(!LIBRARY.find(l=>l.code===x.code)){ custom[x.code]={en:x.en||x.code, zh:x.zh||x.en||x.code}; }
    watchlist.push(x.code); added=true;
  }
  if(added){ await persistList(); renderList(); renderPicker(); refreshQuotes(); }
}

/* ---------- add by photo (CDP statement, handwritten list, etc.) ---------- */
function fileToScaled(file, maxDim=1500, quality=0.72){
  return new Promise((resolve,reject)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height; const s=Math.min(1,maxDim/Math.max(w,h));
      w=Math.max(1,Math.round(w*s)); h=Math.max(1,Math.round(h*s));
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
      resolve(cv.toDataURL("image/jpeg",quality)); };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error("img")); };
    img.src=url;
  });
}
async function onPhoto(ev){
  const file=ev.target.files&&ev.target.files[0]; ev.target.value="";
  if(!file) return;
  photoBusy=true; findResults=[]; pickMsg=""; document.getElementById("search").value=""; renderPicker();
  try{
    const dataUrl=await fileToScaled(file);
    const base64=dataUrl.split(",")[1];
    const arr=await apiPhoto(base64,"image/jpeg",lang);
    findResults=Array.isArray(arr)?arr.filter(x=>x&&x.code):[];
    pickMsg=findResults.length?"":T[lang].photoNone;
  }catch(e){ pickMsg=T[lang].photoNone; }
  photoBusy=false; renderPicker();
}

/* ---------- sheet + search ---------- */
function openSheet(){ document.getElementById("search").value=""; findResults=[]; findBusy=false; photoBusy=false; pickMsg=""; renderPicker();
  document.getElementById("sheetBg").classList.add("open"); document.getElementById("sheet").classList.add("open"); }
function closeSheet(){ clearTimeout(findTimer); document.getElementById("sheetBg").classList.remove("open"); document.getElementById("sheet").classList.remove("open"); }

function onSearchInput(){
  pickMsg="";
  renderPicker();                                   // instant local filtering
  const q=(document.getElementById("search").value||"").trim();
  clearTimeout(findTimer);
  if(q.length>=2){ findTimer=setTimeout(()=>doFind(q),550); }   // then search all SGX
  else { findResults=[]; findBusy=false; renderPicker(); }
}
async function doFind(q){
  lastQuery=q; findBusy=true; renderPicker();
  try{ const arr=await apiFind(q,lang); if(q===lastQuery && Array.isArray(arr)) findResults=arr.filter(x=>x&&x.code); }
  catch(e){}
  if(q===lastQuery){ findBusy=false; renderPicker(); }
}
function micTap(){
  const inp=document.getElementById("search");
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const standalone=(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone;
  if(SR && !standalone){
    try{
      const r=new SR(); r.lang = lang==="zh" ? "zh-CN" : "en-SG"; r.interimResults=false; r.maxAlternatives=1;
      const btn=document.getElementById("micbtn"); btn.classList.add("listening");
      r.onresult=e=>{ inp.value=e.results[0][0].transcript; onSearchInput(); };
      r.onerror=()=>{ try{inp.focus();}catch(_){} };
      r.onend=()=>{ btn.classList.remove("listening"); };
      r.start(); return;
    }catch(e){}
  }
  inp.focus();   // pops the iPad keyboard so its built-in 🎤 can be used (works in the home-screen app)
}

function renderPicker(){
  const t=T[lang], qraw=(document.getElementById("search").value||"").trim(), q=qraw.toLowerCase();
  const localRows = LIBRARY.filter(x=> !q || x.en.toLowerCase().includes(q)||x.zh.includes(q)||x.code.toLowerCase().includes(q));
  const localCodes = new Set(localRows.map(x=>x.code));
  const remoteRows = (findResults||[]).filter(x=> x && !localCodes.has(x.code));
  const row = (x, addCall) => {
    const inList = watchlist.includes(x.code);
    return `<div class="pick ${inList?'in':''}">
      <div><div class="pn">${esc(lang==="zh"?(x.zh||x.en):(x.en||x.zh))}</div>
           <div class="ps">${esc((lang==="zh"?(x.en||x.zh):(x.zh||x.en))||"")} · ${esc(x.code)}</div></div>
      <button class="pickadd" onclick="${inList?'':addCall}" ${inList?'disabled':''}>${inList?t.inlist:'＋'}</button>
    </div>`;
  };
  let html = localRows.map(x=> row(x, `addStock('${x.code}')`)).join("");
  if(remoteRows.length>1 && remoteRows.some(x=>!watchlist.includes(x.code))){
    html += `<button class="addallbtn" onclick="addAll()">＋ ${t.addAll} (${remoteRows.length})</button>`;
  }
  html += remoteRows.map(x=> row(x, `addFromFind(${findResults.indexOf(x)})`)).join("");
  if(photoBusy) html += `<div class="finding">${t.reading}</div>`;
  else if(findBusy) html += `<div class="finding">${t.searching}</div>`;
  if(!html.trim()) html = `<div class="empty">${photoBusy?t.reading:(pickMsg||(qraw?t.noMatches:t.dash))}</div>`;
  document.getElementById("picklist").innerHTML = html;
}

/* ---------- data fetch ---------- */
async function refreshQuotes(){
  await syncList();                                // pull any changes made on another device
  if(watchlist.length===0){ updateStatus(); return; }
  const btn=document.getElementById("refreshBtn"); btn.classList.add("spin"); updateStatus();
  try{
    const arr = await apiQuotes(watchlist);
    if(Array.isArray(arr)){
      arr.forEach(o=>{ if(o&&o.code) quotes[o.code]={price:o.price,change:o.change,changePct:o.changePct,ccy:o.ccy||"SGD"}; });
      lastUpdated=Date.now(); dataError=false; await sset("quotes",quotes); await sset("lastUpdated",lastUpdated);
    }
  }catch(e){ dataError=true; }
  btn.classList.remove("spin"); updateStatus(); renderList();
}
async function loadBrief(c, L){
  const m=meta(c);
  try{
    const obj = await apiBrief(m.code, m.en, L);
    if(!briefs[c]) briefs[c]={};
    if(obj && !obj.error){ const cb=cleanBrief(obj); briefs[c][L]=cb; await sset("briefv12_"+c+"_"+L, cb); }
    else { briefs[c][L]={error:true, reason:(obj&&obj.reason)||null}; }
  }catch(e){ if(!briefs[c]) briefs[c]={}; briefs[c][L]={error:true}; }
  if(openCode===c && lang===L) renderList();
}
async function loadNews(c, force){
  const nd=newsData[c];
  if(!force && nd && (Date.now()-nd.at < 20*60*1000)) return;   // already fresh (<20 min)
  newsBusy[c]=true; if(openCode===c) renderList();
  try{
    const m=meta(c);
    const items=await apiNews(m.code, m.en, lang);
    newsData[c]={items:Array.isArray(items)?items:[], at:Date.now(), lang};
  }catch(e){ if(!newsData[c]) newsData[c]={items:[], at:Date.now(), lang}; }
  newsBusy[c]=false; if(openCode===c) renderList();
}
(async function init(){
  lang = (await sget("lang")) || "zh";
  custom = (await sget("custom")) || {};
  manual = (await sget("manual")) || {};
  const remote = await apiGetList();                       // shared list (null if store not set up)
  if(remote && Array.isArray(remote.watchlist) && remote.watchlist.length){
    watchlist = remote.watchlist; custom = remote.custom || custom; manual = remote.manual || manual;
    await sset("watchlist",watchlist); await sset("custom",custom); await sset("manual",manual);
  } else {
    watchlist = (await sget("watchlist"));
    if(!Array.isArray(watchlist) || !watchlist.length){ watchlist=[...SEED]; }
    await sset("watchlist",watchlist);
    if(remote){ apiSaveList(); }                            // store is set up but empty -> seed it
  }
  quotes = (await sget("quotes")) || {};
  lastUpdated = (await sget("lastUpdated")) || null;
  for(const c of watchlist){
    const n=await sget("note_"+c); if(n) notes[c]=n;
    for(const L of ["zh","en"]){ const b=await sget("briefv12_"+c+"_"+L); if(b){ if(!briefs[c])briefs[c]={}; briefs[c][L]=cleanBrief(b); } }
  }
  applyStaticText(); renderList(); renderPicker();
  refreshQuotes();   // pull fresh prices on open
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ syncList().then(()=>refreshQuotes()); } });
})();
</script>
